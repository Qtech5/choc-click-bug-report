<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Idea — Chocolate Clicker</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header>
  <h1>🍫 Chocolate Clicker — Bug Reports</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="submit.html">Submit a Bug</a>
    <a href="submit-idea.html">Submit an Idea</a>
  </nav>
</header>
<main>
  <article class="bug-detail">
    <h2 id="idea-title"></h2>
    <p class="bug-meta">
      Suggested by <strong id="idea-reporter"></strong> —
      <button id="upvote-btn" class="vote-btn" type="button"><span id="upvote-label">👍 Upvote</span> (<span id="idea-votes">0</span>)</button>
    </p>
    <p id="idea-description"></p>
    <div id="idea-media" class="media-grid"></div>
    <button id="delete-idea" class="delete-btn" type="button">Delete idea</button>
  </article>

  <section class="comments">
    <h3>Comments</h3>
    <div id="comments-list"></div>
    <form id="comment-form" class="form">
      <label for="comment-author">Your name</label>
      <input type="text" id="comment-author" required />
      <label for="comment-text">Comment</label>
      <textarea id="comment-text" rows="3" required></textarea>
      <button type="submit">Post comment</button>
    </form>
  </section>
</main>
<script type="module" src="js/idea-detail.js"></script>
</body>
</html>
