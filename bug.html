<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bug Report — Chocolate Clicker</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header>
  <h1>🍫 Chocolate Clicker — Bug Reports</h1>
  <nav>
    <a href="index.html">All Reports</a>
    <a href="submit.html">Submit a Bug</a>
  </nav>
</header>
<main>
  <article class="bug-detail">
    <h2 id="bug-title"></h2>
    <p class="bug-meta">
      Reported by <strong id="bug-reporter"></strong> —
      <select id="bug-status">
        <option value="Open">Open</option>
        <option value="In Progress">In Progress</option>
        <option value="Fixed">Fixed</option>
      </select>
    </p>
    <p id="bug-description"></p>
    <div id="bug-media" class="media-grid"></div>
    <button id="delete-bug" class="delete-btn" type="button">Delete report</button>
  </article>

  <section class="comments">
    <h3>Comments</h3>
    <div id="comments-list"></div>
    <form id="comment-form" class="form">
      <label for="comment-author">Your name</label>
      <input type="text" id="comment-author" required />
      <label for="comment-text">Comment</label>
      <textarea id="comment-text" rows="3" required></textarea>
      <button type="submit">Post comment</button>
    </form>
  </section>
</main>
<script type="module" src="js/detail.js"></script>
</body>
</html>
